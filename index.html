<!DOCTYPE html>
<html>
<body style="background:#0d0d0f;color:#00eaff;font-family:monospace;">

<h1>OP – Operator</h1>

<a href="plus.html">+</a>
<a href="minus.html">-</a>

<pre id="out">lade…</pre>

<script type="module">
import { WG } from './wg.js';

async function loadTool() {
  const res = await fetch('./tool.json');
  return await res.json();
}

const tool = await loadTool();

document.getElementById("out").textContent =
  JSON.stringify({
    name: tool.name,
    axis: tool.axis,
    mode: tool.mode,
    wg_innen: WG,
    wg_außen: tool.wg,
    beschreibung: tool.description
  }, null, 2);
</script>

</body>
</html>
