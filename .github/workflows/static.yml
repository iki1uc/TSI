name: OP-Master

on:
  workflow_dispatch:

jobs:
  op_init:
    runs-on: ubuntu-latest
    outputs:
      kern_id: ${{ steps.makeid.outputs.kern_id }}

    steps:
      - name: OP erzeugt Kern-ID
        id: makeid
        run: echo "kern_id=op-$(date +%s)" >> $GITHUB_OUTPUT

      - name: OP sendet OK + VERIFY an alle Module
        run: |
          echo "OP: Kern-ID aktiv = ${{ steps.makeid.outputs.kern_id }}"
          echo "OP: OK – VERIFY – Sende an: iki1uc"
          echo "OP: OK – VERIFY – Sende an: iki7uc"
          echo "OP: OK – VERIFY – Sende an: iki2li"
          echo "OP: OK – VERIFY – Sende an: dil.siz.ler"
          echo "OP: Alle Module informiert"
