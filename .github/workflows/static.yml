name: OP-Master

on:
  workflow_dispatch:

jobs:
  op_init:
    runs-on: ubuntu-latest
    outputs:
      kern_id: ${{ steps.makeid.outputs.kern_id }}

    steps:
      - name: OP erzeugt ROOT-Kern-ID
        id: makeid
        run: echo "kern_id=ROOT-OP-$(date +%s)" >> $GITHUB_OUTPUT

      - name: OP ROOT-VERIFY Broadcast
        run: |
          echo "OP: ROOT Kern-ID aktiv = ${{ steps.makeid.outputs.kern_id }}"
          echo "OP: Sende VERIFY an iki1uc"
          echo "OP: Sende VERIFY an iki7uc"
          echo "OP: Sende VERIFY an iki2li"
          echo "OP: Sende VERIFY an dil.siz.ler (ROOT-Hilfe)"
          echo "OP: ROOT-VERIFY abgeschlossen"
