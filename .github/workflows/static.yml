name: respo-${{ github.repository }}

on:
  workflow_run:
    workflows: ["OP-Master"]
    types: [completed]

jobs:
  modul_active:
    runs-on: ubuntu-latest

    steps:
      - name: [MOD] Empfang ROOT-Kern-ID
        run: echo "[MOD-ACTIVE] ROOT-Kern-ID empfangen – Modul=${{ github.repository }}"

      - name: [NC] OK-Block
        if: ${{ success() }}
        run: |
          echo "[NC-OK]"
          echo "UNIT=MODULE"
          echo "MODE=ACTIVE"
          echo "NAME=${{ github.repository }}"
          echo "FILE=.github/workflows/static.yml"
          echo "DETAIL=\"Modul aktiv, Trigger korrekt, OP-Master erkannt\""
          echo "IMPACT=\"Dienst aktiv\""

      - name: [NC] ERROR-Block
        if: ${{ failure() }}
        run: |
          echo "[NC-ERROR]"
          echo "UNIT=MODULE"
          echo "MODE=ACTIVE"
          echo "NAME=${{ github.repository }}"
          echo "TYPE=RUNTIME"
          echo "FILE=.github/workflows/static.yml"
          echo "DETAIL=\"Modul gestartet, aber interner Fehler\""
          echo "IMPACT=\"Dienst ausgefallen\""
          echo "ACTION=\"YML prüfen, Syntax prüfen, letzte Änderung prüfen\""
          exit 1
